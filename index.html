<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ============================================================
   ICONOS
   Reemplazo sencillo de los iconos (sin librerías externas)
   ============================================================ */
function crearIcono(emoji) {
  return function IconoBase({ size = 16, color, style }) {
    return React.createElement(
      "span",
      { style: { fontSize: size, lineHeight: 1, color, display: "inline-block", ...style } },
      emoji
    );
  };
}
const Plus = crearIcono("+");
const X = crearIcono("✕");
const Check = crearIcono("✓");
const CalendarIcon = crearIcono("📅");
const AlertTriangle = crearIcono("⚠");
const Search = crearIcono("🔍");
const Pencil = crearIcono("✎");
const Trash2 = crearIcono("🗑");
const Wallet = crearIcono("💰");

const ChevronRight = crearIcono("▶");

/* ============================================================

   (la consigues gratis en https://console.firebase.google.com)
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBvH9H8Ye-_B_znfnrHUiy1Kcc-zORZwUg",

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Imita la misma API que usaba el artifact de Claude (window.storage),
// para no tener que tocar el resto del código de la aplicación.
window.storage = {
  async get(key, shared) {
    if (!shared) {
      const raw = localStorage.getItem(key);
      if (raw === null) throw new Error("no encontrado");
      return { key, value: raw, shared: false };
    }
    const snap = await db.collection("veta").doc(key).get();
    if (!snap.exists) throw new Error("no encontrado");
    return { key, value: snap.data().value, shared: true };
  },
  async set(key, value, shared) {
    if (!shared) {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    }
    await db.collection("veta").doc(key).set({ value });
    return { key, value, shared: true };
  },
};

// ---------- config ----------
const DIAS_AVISO = 3;
// Clave para aprobar el acceso de nuevas personas y gestionar solicitudes.
// Cámbiala por la que quieras usar tú (edita este archivo cuando quieras rotarla).
const CLAVE_ADMIN = "ORO2026";

const BANCOS_CO = [
  "Bancolombia", "Davivienda", "Banco de Bogotá", "BBVA Colombia",
  "Banco de Occidente", "Banco Popular", "Banco Caja Social", "Banco Agrario",
  "Banco AV Villas", "Scotiabank Colpatria", "Itaú", "Nequi", "Daviplata", "Otro",
];

// ---------- utilidades ----------
const fmtCOP = (n) =>
  new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 }).format(n || 0);

const formatMiles = (raw) => String(raw || "").replace(/[^0-9]/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ".");

const todayISO = () => new Date().toISOString().slice(0, 10);

const daysUntil = (dateStr) => {
  const d = new Date(dateStr + "T00:00:00");
  const t = new Date(todayISO() + "T00:00:00");
  return Math.round((d - t) / 86400000);
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

const montoTotal = (d) => d.monto + (d.monto * (d.tasa || 0)) / 100;
const abonadoDe = (d) => (d.abonos || []).reduce((a, b) => a + b.valor, 0);
const restanteDe = (d) => Math.max(montoTotal(d) - abonadoDe(d), 0);

function estadoDeuda(deuda) {
  if (restanteDe(deuda) <= 0) return "pagado";
  const dias = daysUntil(deuda.fechaPago);
  if (dias <= DIAS_AVISO) return "proximo";
  return "vigente";
}

const ESTADO_INFO = {
  proximo: { label: "Próximo a vencer", color: "#E08D3C", bg: "rgba(224,141,60,0.14)" },
  vigente: { label: "Vigente", color: "#7FA37A", bg: "rgba(127,163,122,0.12)" },
  pagado: { label: "Pagado", color: "#6B8F5D", bg: "rgba(107,143,93,0.14)" },
};

const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS = ["L","M","X","J","V","S","D"];

// ---------- storage: deudas ----------
async function loadDeudas() {
  try {
    const res = await window.storage.get("deudas:index", true);
    return res ? JSON.parse(res.value) : [];
  } catch { return []; }
}
async function saveDeudas(list) {
  await window.storage.set("deudas:index", JSON.stringify(list), true);
}

// ---------- storage: accesos ----------
async function cargarSolicitudes() {
  try {
    const r = await window.storage.get("accesos:solicitudes", true);
    return r ? JSON.parse(r.value) : [];
  } catch { return []; }
}
async function guardarSolicitudes(lista) {
  await window.storage.set("accesos:solicitudes", JSON.stringify(lista), true);
}

// =====================================================================
// PORTÓN DE ACCESO
// =====================================================================
function AccessGate({ children }) {
  const [estado, setEstado] = useState("cargando"); // cargando | sin-solicitar | pendiente | rechazado | aprobado
  const [esAdmin, setEsAdmin] = useState(false);
  const [misolicitud, setMisolicitud] = useState(null);
  const [solicitudes, setSolicitudes] = useState([]);
  const [panelAdmin, setPanelAdmin] = useState(false);

  const revisar = useCallback(async () => {
    let aprobadoPersonal = null, adminPersonal = null, misol = null;
    try { aprobadoPersonal = (await window.storage.get("acceso:aprobado", false))?.value; } catch {}
    try { adminPersonal = (await window.storage.get("acceso:esadmin", false))?.value; } catch {}
    try {
      const r = await window.storage.get("acceso:misolicitud", false);
      misol = r ? JSON.parse(r.value) : null;
    } catch {}
    setMisolicitud(misol);
    setEsAdmin(adminPersonal === "si");

    if (aprobadoPersonal === "si") { setEstado("aprobado"); return; }

    const lista = await cargarSolicitudes();
    setSolicitudes(lista);
    if (!misol) { setEstado("sin-solicitar"); return; }
    const encontrada = lista.find((s) => s.id === misol.id);
    if (!encontrada) { setEstado("sin-solicitar"); return; }
    if (encontrada.estado === "aprobado") {
      await window.storage.set("acceso:aprobado", "si", false);
    }
    setEstado(encontrada.estado);
  }, []);

  useEffect(() => { revisar(); }, [revisar]);

  useEffect(() => {
    if (estado !== "pendiente") return;
    const t = setInterval(revisar, 12000);
    return () => clearInterval(t);
  }, [estado, revisar]);

  const solicitarAcceso = async (nombre) => {
    const id = uid();
    const nueva = { id, nombre: nombre.trim(), fecha: new Date().toISOString(), estado: "pendiente" };
    const lista = await cargarSolicitudes();
    const next = [...lista, nueva];
    await guardarSolicitudes(next);
    await window.storage.set("acceso:misolicitud", JSON.stringify({ id, nombre: nombre.trim() }), false);
    setMisolicitud({ id, nombre: nombre.trim() });
    setSolicitudes(next);
    setEstado("pendiente");
  };

  const entrarComoAdmin = async (clave) => {
    if (clave.trim() !== CLAVE_ADMIN) return false;
    try { await window.storage.set("acceso:aprobado", "si", false); } catch {}
    try { await window.storage.set("acceso:esadmin", "si", false); } catch {}
    setEsAdmin(true);
    setEstado("aprobado");
    return true;
  };

  const responderSolicitud = async (id, nuevoEstado) => {
    const lista = await cargarSolicitudes();
    const next = lista.map((s) => (s.id === id ? { ...s, estado: nuevoEstado } : s));
    await guardarSolicitudes(next);
    setSolicitudes(next);
  };

  if (estado === "cargando") {
    return (
      <div style={S.loadingWrap}>
        <div style={S.loadingCard}>
          <Coins size={28} color="#C9A227" />
          <div style={{ marginTop: 10, color: "#A89A82" }}>Verificando acceso…</div>
        </div>
      </div>
    );
  }

  if (estado !== "aprobado") {
    return (
      <PantallaAcceso
        estado={estado}
        onSolicitar={solicitarAcceso}
        onAdmin={entrarComoAdmin}
      />
    );
  }

  return (
    <>
      {children}
      {esAdmin && (
        <button style={S.adminFab} onClick={() => setPanelAdmin(true)}>
          <Users size={15} /> Accesos
        </button>
      )}
      {panelAdmin && (
        <PanelAdmin
          solicitudes={solicitudes}
          onResponder={responderSolicitud}
          onRefrescar={async () => setSolicitudes(await cargarSolicitudes())}
          onCerrar={() => setPanelAdmin(false)}
        />
      )}
    </>
  );
}

function PantallaAcceso({ estado, onSolicitar, onAdmin }) {
  const [nombre, setNombre] = useState("");
  const [err, setErr] = useState("");
  const [mostrarAdmin, setMostrarAdmin] = useState(false);
  const [clave, setClave] = useState("");
  const [claveErr, setClaveErr] = useState("");

  return (
    <div style={S.loadingWrap}>
      <div style={S.accessCard}>
        <div style={S.logoMark}><Lock size={18} color="#171310" /></div>
        <div style={S.title}>Veta</div>
        <div style={{ ...S.subtitle, marginBottom: 18 }}>libro de préstamos y pagos — acceso restringido</div>

        {estado === "sin-solicitar" && !mostrarAdmin && (
          <>
            <div style={S.accessText}>Escribe tu nombre para pedir acceso. Alguien con permiso de administrador debe aprobarlo.</div>
            <input style={S.input} placeholder="Tu nombre" value={nombre} onChange={(e) => setNombre(e.target.value)} />
            {err && <div style={S.formError}>{err}</div>}
            <button
              style={{ ...S.addBtn, marginTop: 12, width: "100%", justifyContent: "center" }}
              onClick={() => (nombre.trim() ? onSolicitar(nombre) : setErr("Escribe tu nombre."))}
            >
              Solicitar acceso
            </button>
            <div style={S.accessAdminLink} onClick={() => setMostrarAdmin(true)}>¿Eres el administrador?</div>
          </>
        )}

        {estado === "pendiente" && (
          <div style={S.accessText}>
            Tu solicitud fue enviada. Esta pantalla se actualiza sola en cuanto alguien te dé acceso — no necesitas hacer nada más.
          </div>
        )}

        {estado === "rechazado" && (
          <div style={S.accessText}>Tu solicitud de acceso fue rechazada. Habla con quien administra este libro si crees que es un error.</div>
        )}

        {mostrarAdmin && (
          <>
            <div style={S.accessText}>Clave de administrador:</div>
            <input type="password" style={S.input} value={clave} onChange={(e) => setClave(e.target.value)} />
            {claveErr && <div style={S.formError}>{claveErr}</div>}
            <button
              style={{ ...S.addBtn, marginTop: 12, width: "100%", justifyContent: "center" }}
              onClick={async () => {
                setClaveErr("");
                try {
                  const ok = await onAdmin(clave);
                  if (!ok) setClaveErr("Clave incorrecta.");
                } catch {
                  setClaveErr("Ocurrió un error al validar. Intenta de nuevo.");
                }
              }}
            >
              <ShieldCheck size={15} /> Entrar como administrador
            </button>
            <div style={S.accessAdminLink} onClick={() => setMostrarAdmin(false)}>Volver</div>
          </>
        )}
      </div>
    </div>
  );
}

function PanelAdmin({ solicitudes, onResponder, onRefrescar, onCerrar }) {
  const pendientes = solicitudes.filter((s) => s.estado === "pendiente");
  const resueltas = solicitudes.filter((s) => s.estado !== "pendiente");

  useEffect(() => {
    const t = setInterval(onRefrescar, 10000);
    return () => clearInterval(t);
  }, [onRefrescar]);

  return (
    <div style={S.overlay} onClick={onCerrar}>
      <div style={S.modal} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalHeader}>
          <div style={S.modalTitle}>Solicitudes de acceso</div>
          <button style={S.iconBtn} onClick={onCerrar}><X size={18} /></button>
        </div>

        <div style={S.fieldLabel}>Pendientes ({pendientes.length})</div>
        {pendientes.length === 0 && <div style={{ ...S.emptyText, margin: "8px 0 16px" }}>No hay solicitudes esperando respuesta.</div>}
        {pendientes.map((s) => (
          <div key={s.id} style={S.calItem}>
            <div style={S.calItemName}>{s.nombre}</div>
            <div style={S.cardActions}>
              <button style={S.actionBtnPrimary} onClick={() => onResponder(s.id, "aprobado")}><Check size={14} /> Aprobar</button>
              <button style={S.actionBtnDanger} onClick={() => onResponder(s.id, "rechazado")}><X size={14} /> Rechazar</button>
            </div>
          </div>
        ))}

        {resueltas.length > 0 && (
          <>
            <div style={{ ...S.fieldLabel, marginTop: 16 }}>Ya resueltas</div>
            {resueltas.map((s) => (
              <div key={s.id} style={{ ...S.calItem, opacity: 0.7 }}>
                <div style={S.calItemName}>{s.nombre}</div>
                <div style={{ ...S.badge, color: s.estado === "aprobado" ? "#7FA37A" : "#D97757", background: "transparent" }}>
                  {s.estado === "aprobado" ? "Aprobado" : "Rechazado"}
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// =====================================================================
// APP PRINCIPAL
// =====================================================================
function App() {
  return (
    <AccessGate>
      <LibroDeVeta />
    </AccessGate>
  );
}

function LibroDeVeta() {
  const [deudas, setDeudas] = useState(null);
  const [vista, setVista] = useState("lista");
  const [busqueda, setBusqueda] = useState("");
  const [filtroEstado, setFiltroEstado] = useState("todos");
  const [modalAbierto, setModalAbierto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [abonoDe, setAbonoDe] = useState(null);
  const [confirmarBorrar, setConfirmarBorrar] = useState(null);
  const [mesCalendario, setMesCalendario] = useState(() => {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [diaSeleccionado, setDiaSeleccionado] = useState(null);
  const [error, setError] = useState("");
  const [notifPermiso, setNotifPermiso] = useState(
    typeof window !== "undefined" && "Notification" in window ? Notification.permission : "unsupported"
  );

  useEffect(() => { loadDeudas().then(setDeudas); }, []);

  useEffect(() => {
    if (!deudas || deudas.length === 0) return;
    if (notifPermiso !== "granted") return;
    (async () => {
      const hoy = todayISO();
      let notificados = {};
      try {
        const r = await window.storage.get(`avisos:${hoy}`, false);
        notificados = r ? JSON.parse(r.value) : {};
      } catch {}
      let cambiado = false;
      for (const d of deudas) {
        if (restanteDe(d) <= 0) continue;
        const dias = daysUntil(d.fechaPago);
        if (dias <= DIAS_AVISO && !notificados[d.id]) {
          const texto =
            dias === 0 ? `Hoy se paga a ${d.nombre}`
            : dias < 0 ? `Pago a ${d.nombre} sigue pendiente (fecha era hace ${Math.abs(dias)} día${Math.abs(dias) === 1 ? "" : "s"})`
            : `Pago a ${d.nombre} vence en ${dias} día${dias === 1 ? "" : "s"}`;
          try { new Notification("Veta · recordatorio de pago", { body: `${texto} · ${fmtCOP(restanteDe(d))}` }); } catch {}
          notificados[d.id] = true;
          cambiado = true;
        }
      }
      if (cambiado) {
        try { await window.storage.set(`avisos:${hoy}`, JSON.stringify(notificados), false); } catch {}
      }
    })();
  }, [deudas, notifPermiso]);

  const pedirPermisoNotif = async () => {
    if (!("Notification" in window)) return;
    setNotifPermiso(await Notification.requestPermission());
  };

  const persist = useCallback(async (next) => {
    setDeudas(next);
    try { await saveDeudas(next); }
    catch { setError("No se pudo guardar el cambio. Intenta de nuevo."); setTimeout(() => setError(""), 4000); }
  }, []);

  const upsertDeuda = (deuda) => {
    setDeudas((prev) => {
      const list = prev || [];
      const exists = list.some((d) => d.id === deuda.id);
      const next = exists ? list.map((d) => (d.id === deuda.id ? deuda : d)) : [...list, deuda];
      persist(next);
      return next;
    });
    setModalAbierto(false); setEditando(null);
  };

  const borrarDeuda = (id) => {
    setDeudas((prev) => { const next = (prev || []).filter((d) => d.id !== id); persist(next); return next; });
    setConfirmarBorrar(null);
  };

  const registrarAbono = (id, valor, fecha) => {
    setDeudas((prev) => {
      const next = (prev || []).map((d) => d.id === id ? { ...d, abonos: [...(d.abonos || []), { valor, fecha }] } : d);
      persist(next);
      return next;
    });
    setAbonoDe(null);
  };

  const lista = deudas || [];

  const recordatorios = useMemo(() =>
    lista.filter((d) => restanteDe(d) > 0 && daysUntil(d.fechaPago) <= DIAS_AVISO)
         .sort((a, b) => new Date(a.fechaPago) - new Date(b.fechaPago)),
    [lista]
  );

  const filtradas = useMemo(() => {
    return lista
      .filter((d) => {
        const est = estadoDeuda(d);
        if (filtroEstado !== "todos" && est !== filtroEstado) return false;
        if (busqueda && !d.nombre.toLowerCase().includes(busqueda.toLowerCase())) return false;
        return true;
      })
      .sort((a, b) => {
        const order = { proximo: 0, vigente: 1, pagado: 2 };
        const ea = estadoDeuda(a), eb = estadoDeuda(b);
        if (order[ea] !== order[eb]) return order[ea] - order[eb];
        return new Date(a.fechaPago) - new Date(b.fechaPago);
      });
  }, [lista, busqueda, filtroEstado]);

  if (deudas === null) {
    return (
      <div style={S.loadingWrap}>
        <div style={S.loadingCard}>
          <Coins size={28} color="#C9A227" />
          <div style={{ marginTop: 10, color: "#A89A82" }}>Abriendo el libro de veta…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={S.app}>
      <style>{GLOBAL_CSS}</style>

      <header style={S.header}>
        <div style={S.headerLeft}>
          <div style={S.logoMark}><Coins size={20} color="#171310" /></div>
          <div>
            <div style={S.title}>Veta</div>
            <div style={S.subtitle}>libro de préstamos y pagos</div>
          </div>
        </div>
        <div style={S.headerRight}>
          <div style={S.tabs}>
            <button style={{ ...S.tabBtn, ...(vista === "lista" ? S.tabBtnActive : {}) }} onClick={() => setVista("lista")}><ClipboardList size={15} /> Lista</button>
            <button style={{ ...S.tabBtn, ...(vista === "calendario" ? S.tabBtnActive : {}) }} onClick={() => setVista("calendario")}><CalendarIcon size={15} /> Calendario</button>
          </div>
          {notifPermiso !== "granted" && notifPermiso !== "unsupported" && (
            <button style={S.notifBtn} onClick={pedirPermisoNotif}><Bell size={14} /> Activar avisos del navegador</button>
          )}
          {notifPermiso === "granted" && <div style={S.notifOn}><Bell size={14} /> Avisos activos en este navegador</div>}
        </div>
      </header>

      {recordatorios.length > 0 && (
        <div style={S.reminderBanner}>
          <div style={S.reminderTitle}><AlertTriangle size={15} color="#E08D3C" /> Pagos que se acercan</div>
          <div style={S.reminderList}>
            {recordatorios.map((d) => {
              const dias = daysUntil(d.fechaPago);
              const texto = dias === 0 ? "hoy" : dias < 0 ? `hace ${Math.abs(dias)} día${Math.abs(dias) === 1 ? "" : "s"}` : `en ${dias} día${dias === 1 ? "" : "s"}`;
              return (
                <div key={d.id} style={S.reminderChip} onClick={() => { setEditando(d); setModalAbierto(true); }}>
                  <strong>{d.nombre}</strong> · {fmtCOP(restanteDe(d))} · vence {texto}
                </div>
              );
            })}
          </div>
          {notifPermiso !== "granted" && notifPermiso !== "unsupported" && (
            <div style={S.reminderHint}>Activa los avisos del navegador arriba para recibir una notificación automática mientras esta pestaña esté abierta.</div>
          )}
        </div>
      )}

      {error && <div style={S.errorBanner}>{error}</div>}

      {vista === "lista" ? (
        <>
          <div style={S.toolbar}>
            <div style={S.searchBox}>
              <Search size={15} color="#A89A82" />
              <input style={S.searchInput} placeholder="Buscar por nombre…" value={busqueda} onChange={(e) => setBusqueda(e.target.value)} />
            </div>
            <div style={S.filtros}>
              {["todos", "proximo", "vigente", "pagado"].map((f) => (
                <button key={f} onClick={() => setFiltroEstado(f)} style={{ ...S.filtroChip, ...(filtroEstado === f ? S.filtroChipActive : {}) }}>
                  {f === "todos" ? "Todos" : ESTADO_INFO[f].label}
                </button>
              ))}
            </div>
            <button style={S.addBtn} onClick={() => { setEditando(null); setModalAbierto(true); }}><Plus size={16} /> Nuevo préstamo</button>
          </div>

          {filtradas.length === 0 ? (
            <EmptyState onAdd={() => { setEditando(null); setModalAbierto(true); }} hasAny={lista.length > 0} />
          ) : (
            <div style={S.listWrap}>
              {filtradas.map((d) => (
                <DeudaCard key={d.id} deuda={d} onEditar={() => { setEditando(d); setModalAbierto(true); }} onAbonar={() => setAbonoDe(d)} onBorrar={() => setConfirmarBorrar(d)} />
              ))}
            </div>
          )}
        </>
      ) : (
        <VistaCalendario deudas={lista} mes={mesCalendario} setMes={setMesCalendario} diaSeleccionado={diaSeleccionado} setDiaSeleccionado={setDiaSeleccionado} onEditar={(d) => { setEditando(d); setModalAbierto(true); }} />
      )}

      {modalAbierto && <ModalDeuda inicial={editando} onGuardar={upsertDeuda} onCerrar={() => { setModalAbierto(false); setEditando(null); }} />}
      {abonoDe && <ModalAbono deuda={abonoDe} onGuardar={(valor, fecha) => registrarAbono(abonoDe.id, valor, fecha)} onCerrar={() => setAbonoDe(null)} />}
      {confirmarBorrar && <ModalConfirmar nombre={confirmarBorrar.nombre} onConfirmar={() => borrarDeuda(confirmarBorrar.id)} onCancelar={() => setConfirmarBorrar(null)} />}

      <footer style={S.footer}>Los datos de este libro son compartidos con quien tenga acceso aprobado.</footer>
    </div>
  );
}

function DeudaCard({ deuda, onEditar, onAbonar, onBorrar }) {
  const abonado = abonadoDe(deuda);
  const total = montoTotal(deuda);
  const restante = restanteDe(deuda);
  const pct = Math.min(100, Math.round((abonado / total) * 100));
  const est = estadoDeuda(deuda);
  const info = ESTADO_INFO[est];
  const dias = daysUntil(deuda.fechaPago);

  let diasTexto;
  if (est === "pagado") diasTexto = "Saldado";
  else if (dias < 0) diasTexto = `Fecha era hace ${Math.abs(dias)} día${Math.abs(dias) === 1 ? "" : "s"}`;
  else if (dias === 0) diasTexto = "Vence hoy";
  else diasTexto = `Vence en ${dias} día${dias === 1 ? "" : "s"}`;

  return (
    <div style={S.card}>
      <div style={S.cardTop}>
        <div>
          <div style={S.cardName}>{deuda.nombre}</div>
          <div style={S.cardMeta}>{deuda.motivo || "Sin concepto"}</div>
        </div>
        <div style={{ ...S.badge, color: info.color, background: info.bg }}>{info.label}</div>
      </div>

      <div style={S.veta}><div style={{ ...S.vetaFill, width: `${pct}%` }} /></div>
      <div style={S.vetaLabels}><span>{fmtCOP(abonado)} abonado</span><span>{fmtCOP(restante)} pendiente de {fmtCOP(total)}</span></div>

      <div style={S.cardGrid}>
        <div><div style={S.cardLabel}>Banco</div><div style={S.cardValue}>{deuda.banco || "—"}</div></div>
        <div><div style={S.cardLabel}>Número de cuenta</div><div style={S.cardValue}>{deuda.cuenta || "—"}</div></div>
        <div><div style={S.cardLabel}>Monto prestado / tasa</div><div style={S.cardValue}>{fmtCOP(deuda.monto)} · {deuda.tasa || 0}%</div></div>
        <div><div style={S.cardLabel}>Prestado el</div><div style={S.cardValue}>{deuda.fechaPrestamo}</div></div>
        <div><div style={S.cardLabel}>Fecha de pago</div><div style={{ ...S.cardValue, color: info.color, fontWeight: 600 }}>{deuda.fechaPago} · {diasTexto}</div></div>
      </div>

      {deuda.notas && <div style={S.notas}>{deuda.notas}</div>}

      <div style={S.cardActions}>
        {est !== "pagado" && <button style={S.actionBtnPrimary} onClick={onAbonar}><Wallet size={14} /> Registrar abono</button>}
        <button style={S.actionBtn} onClick={onEditar}><Pencil size={14} /> Editar</button>
        <button style={S.actionBtnDanger} onClick={onBorrar}><Trash2 size={14} /> Eliminar</button>
      </div>
    </div>
  );
}

function ModalDeuda({ inicial, onGuardar, onCerrar }) {
  const bancoInicial = inicial?.banco || "";
  const enLista = BANCOS_CO.includes(bancoInicial);

  const [nombre, setNombre] = useState(inicial?.nombre || "");
  const [bancoSel, setBancoSel] = useState(enLista ? bancoInicial : (bancoInicial ? "Otro" : ""));
  const [bancoOtro, setBancoOtro] = useState(enLista ? "" : bancoInicial);
  const [cuenta, setCuenta] = useState(inicial?.cuenta || "");
  const [monto, setMonto] = useState(inicial?.monto ? String(inicial.monto) : "");
  const [tasa, setTasa] = useState(inicial?.tasa != null ? String(inicial.tasa) : "0");
  const [motivo, setMotivo] = useState(inicial?.motivo || "");
  const [fechaPrestamo, setFechaPrestamo] = useState(inicial?.fechaPrestamo || todayISO());
  const [fechaPago, setFechaPago] = useState(inicial?.fechaPago || todayISO());
  const [notas, setNotas] = useState(inicial?.notas || "");
  const [err, setErr] = useState("");

  const montoNum = Number(monto) || 0;
  const tasaNum = Number(tasa) || 0;
  const totalPreview = montoNum + (montoNum * tasaNum) / 100;

  const guardar = () => {
    if (!nombre.trim()) return setErr("Falta el nombre de la persona.");
    if (!montoNum || montoNum <= 0) return setErr("El monto debe ser un número mayor a cero.");
    if (tasaNum < 0) return setErr("La tasa no puede ser negativa.");
    if (!fechaPago) return setErr("Falta la fecha de pago.");
    const bancoFinal = bancoSel === "Otro" ? bancoOtro.trim() : bancoSel;
    onGuardar({
      id: inicial?.id || uid(),
      nombre: nombre.trim(),
      banco: bancoFinal,
      cuenta: cuenta.trim(),
      monto: montoNum,
      tasa: tasaNum,
      motivo: motivo.trim(),
      fechaPrestamo,
      fechaPago,
      notas: notas.trim(),
      abonos: inicial?.abonos || [],
    });
  };

  return (
    <div style={S.overlay} onClick={onCerrar}>
      <div style={S.modal} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalHeader}>
          <div style={S.modalTitle}>{inicial ? "Editar préstamo" : "Nuevo préstamo"}</div>
          <button style={S.iconBtn} onClick={onCerrar}><X size={18} /></button>
        </div>

        <div style={S.formGrid}>
          <Field label="Nombre de la persona *" span={2}>
            <input style={S.input} value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Ej. Carlos Ramírez" />
          </Field>

          <Field label="Banco">
            <select style={S.input} value={bancoSel} onChange={(e) => setBancoSel(e.target.value)}>
              <option value="">Selecciona un banco</option>
              {BANCOS_CO.map((b) => <option key={b} value={b}>{b}</option>)}
            </select>
          </Field>
          <Field label={bancoSel === "Otro" ? "Nombre del banco" : "Número de cuenta"}>
            {bancoSel === "Otro" ? (
              <input style={S.input} value={bancoOtro} onChange={(e) => setBancoOtro(e.target.value)} placeholder="Nombre del banco" />
            ) : (
              <input style={S.input} value={cuenta} onChange={(e) => setCuenta(e.target.value)} placeholder="Ej. Ahorros 123-456789-00" />
            )}
          </Field>
          {bancoSel === "Otro" && (
            <Field label="Número de cuenta" span={2}>
              <input style={S.input} value={cuenta} onChange={(e) => setCuenta(e.target.value)} placeholder="Ej. Ahorros 123-456789-00" />
            </Field>
          )}

          <Field label="Monto prestado (COP) *">
            <input style={S.input} inputMode="numeric" value={formatMiles(monto)} onChange={(e) => setMonto(e.target.value.replace(/[^0-9]/g, ""))} placeholder="0" />
          </Field>
          <Field label="Tasa de interés (%)">
            <div style={S.inputWithIcon}>
              <input style={S.inputBare} value={tasa} onChange={(e) => setTasa(e.target.value.replace(/[^0-9.]/g, ""))} placeholder="0" inputMode="decimal" />
              <Percent size={14} color="#A89A82" />
            </div>
          </Field>

          <Field label="Motivo / concepto" span={2}>
            <input style={S.input} value={motivo} onChange={(e) => setMotivo(e.target.value)} placeholder="¿Para qué se prestó?" />
          </Field>

          <Field label="Fecha del préstamo">
            <input type="date" style={S.input} value={fechaPrestamo} onChange={(e) => setFechaPrestamo(e.target.value)} />
          </Field>
          <Field label="Fecha de pago *">
            <input type="date" style={S.input} value={fechaPago} onChange={(e) => setFechaPago(e.target.value)} />
          </Field>

          <Field label="Notas" span={2}>
            <textarea style={{ ...S.input, minHeight: 70, resize: "vertical" }} value={notas} onChange={(e) => setNotas(e.target.value)} placeholder="Detalles adicionales" />
          </Field>
        </div>

        {montoNum > 0 && (
          <div style={S.previewBox}>Total a pagar con el {tasaNum || 0}%: <strong style={{ color: "#F0E6D2" }}>{fmtCOP(totalPreview)}</strong></div>
        )}

        {err && <div style={S.formError}>{err}</div>}

        <div style={S.modalActions}>
          <button style={S.actionBtn} onClick={onCerrar}>Cancelar</button>
          <button style={S.actionBtnPrimary} onClick={guardar}><Check size={15} /> Guardar</button>
        </div>
      </div>
    </div>
  );
}

function ModalAbono({ deuda, onGuardar, onCerrar }) {
  const restante = restanteDe(deuda);
  const [valor, setValor] = useState(String(restante));
  const [fecha, setFecha] = useState(todayISO());
  const [err, setErr] = useState("");

  const guardar = () => {
    const n = Number(valor);
    if (!n || n <= 0) return setErr("Ingresa un valor de abono mayor a cero.");
    onGuardar(n, fecha);

  return (
    <div style={S.overlay} onClick={onCerrar}>
      <div style={{ ...S.modal, maxWidth: 380 }} onClick={(e) => e.stopPropagation()}>

function VistaCalendario({ deudas, mes, setMes, diaSeleccionado, setDiaSeleccionado, onEditar }) {
  const { y, m } = mes;
  const primerDia = new Date(y, m, 1);
  const offset = (primerDia.getDay() + 6) % 7;
  const diasEnMes = new Date(y, m + 1, 0).getDate();

  const porDia = useMemo(() => {
    const map = {};
    deudas.forEach((d) => {
      const [yy, mm, dd] = d.fechaPago.split("-").map(Number);
      if (yy === y && mm - 1 === m) { map[dd] = map[dd] || []; map[dd].push(d); }
    });
    return map;
  }, [deudas, y, m]);

  const celdas = [];
  for (let i = 0; i < offset; i++) celdas.push(null);
  for (let d = 1; d <= diasEnMes; d++) celdas.push(d);

  const cambiarMes = (delta) => {
    let nm = m + delta, ny = y;
    if (nm < 0) { nm = 11; ny--; } if (nm > 11) { nm = 0; ny++; }
    setMes({ y: ny, m: nm }); setDiaSeleccionado(null);
  };

  const seleccionadas = diaSeleccionado ? (porDia[diaSeleccionado] || []) : [];
  const hoy = new Date();
  const esHoyMes = hoy.getFullYear() === y && hoy.getMonth() === m;

  return (
    <div style={S.calWrap} className="cal-wrap">
      <div style={S.calMain}>
        <div style={S.calHeader}>
          <button style={S.iconBtn} onClick={() => cambiarMes(-1)}><ChevronLeft size={18} /></button>
          <div style={S.calMonthTitle}>{MESES[m]} {y}</div>
          <button style={S.iconBtn} onClick={() => cambiarMes(1)}><ChevronRight size={18} /></button>
        </div>
        <div style={S.calGridHead}>{DIAS.map((d) => <div key={d} style={S.calDow}>{d}</div>)}</div>
        <div style={S.calGrid}>
          {celdas.map((d, i) => {
            if (d === null) return <div key={i} style={S.calCellEmpty} />;
            const items = porDia[d] || [];
            const esHoy = esHoyMes && hoy.getDate() === d;
            const tieneProximo = items.some((x) => estadoDeuda(x) === "proximo");
            return (
              <button key={i} onClick={() => items.length && setDiaSeleccionado(diaSeleccionado === d ? null : d)}
                style={{ ...S.calCell, ...(esHoy ? S.calCellHoy : {}), ...(diaSeleccionado === d ? S.calCellSel : {}), cursor: items.length ? "pointer" : "default" }}>
                <span style={S.calCellNum}>{d}</span>
                {items.length > 0 && <span style={{ ...S.calDot, background: tieneProximo ? "#E08D3C" : "#7FA37A" }}>{items.length}</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={S.calSide}>
        <div style={S.calSideTitle}>{diaSeleccionado ? `Vencen el ${diaSeleccionado} de ${MESES[m]}` : "Selecciona un día con pagos"}</div>
        {seleccionadas.length === 0 && <div style={S.emptyText}>Haz clic en un día marcado del calendario para ver los pagos que vencen.</div>}
        {seleccionadas.map((d) => {
          const info = ESTADO_INFO[estadoDeuda(d)];
          return (
            <div key={d.id} style={S.calItem} onClick={() => onEditar(d)}>
              <div style={S.calItemName}>{d.nombre}</div>
              <div style={{ ...S.badge, color: info.color, background: info.bg }}>{info.label}</div>
              <div style={S.calItemAmt}>{fmtCOP(restanteDe(d))} pendiente</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
